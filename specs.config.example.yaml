# =============================================================================
# project-specs Configuration
# =============================================================================
# Copy this file to specs.config.yaml and customize for your project.
# All values shown are defaults.

# --- Project Info ---
project_name: "my-project"
project_description: "A brief description of what this project does"

# --- Provider ---
# Which coding-agent provider this project targets. setup.sh reads the matching
# providers/<provider>/manifest.yaml for install location, format transform, and
# model-tier defaults. Default is "claude" — existing Claude Code installs are
# unaffected unless you re-run setup.sh with a different --provider.
provider: "claude"                  # Options: claude, codex, cursor

# --- Thoughts Directory ---
# The thoughts/ directory stores plans, handoffs, ticket research, and PR
# descriptions for cross-session continuity. Set to false if you don't want
# a persistent document store (commands will ask where to save instead).
thoughts_directory: true
thoughts_path: "thoughts/shared"    # Relative to project root

# --- Ticket System Integration ---
# Configure your project management tool. Commands in commands/integrations/
# read these values to interact with tickets.
ticket_system: "linear"             # Options: linear, jira, asana, github-issues
ticket_integration: "mcp"           # How commands reach the ticket system: mcp, cli, none
ticket_mcp_prefix: "mcp__linear"    # Used when ticket_integration: mcp (MCP tool prefix)
ticket_cli: ""                      # Used when ticket_integration: cli (e.g. "linear-cli")
ticket_id_pattern: "ENG-\\d+"       # Regex to extract ticket IDs from branch names
ticket_default_project: ""          # Default project/board for new tickets
ticket_statuses:                    # Map generic statuses to your system's labels
  todo: "Todo"
  in_progress: "In Progress"
  in_review: "In Review"
  done: "Done"

# --- Git & PR Conventions ---
branch_prefix: "feat/"              # Default prefix for new branches
commit_style: "conventional"        # Options: conventional, freeform
pr_template_path: "thoughts/shared/pr_description.md"  # PR description template
default_base_branch: "main"         # Base branch for PRs

# --- Model Selection ---
# Commands and agents declare a SEMANTIC TIER in their frontmatter
# (model: planning | analysis | quick) rather than a literal model name. This
# block maps each tier to a concrete model for THIS project/provider, so you can
# retune globally in one place — e.g. set analysis: "opus" to make all research
# and analysis work use opus.
#
# Defaults below are for Claude Code. For other providers, the per-provider
# defaults come from providers/<provider>/manifest.yaml (Codex auto-selects a
# recommended model; Cursor model selection is UI-only). Values here override
# the manifest defaults when set.
models:
  planning: "opus"                  # Deep reasoning, architecture decisions
  analysis: "sonnet"                # Code analysis, research, implementation
  quick: "haiku"                    # Simple lookups, formatting, classification

# --- Debug ---
# Paths for the /debug command to investigate. Leave empty to be prompted.
log_directory: ""                   # Path to application logs (e.g., "logs/" or "/var/log/myapp/")
database_path: ""                   # Path to local database file (e.g., "data/app.db")

# --- CI/CD ---
ci_mode: false                      # true = non-interactive (no user prompts)
ci_commit_prefix: "ci: "            # Prefix for CI-generated commits

# --- Worktree ---
worktree_base_path: "../worktrees"  # Where git worktrees are created
worktree_auto_cleanup: true         # Remove worktrees after merge
