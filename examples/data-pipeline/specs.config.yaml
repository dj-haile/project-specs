# specs.config.yaml — Data Pipeline Example
#
# ETL/ML data pipeline project with freeform commits and Asana for task tracking.
# Copy this file to your project root and customize as needed.

project_name: "data-pipeline"
project_description: "ETL and ML feature pipeline with dbt and Airflow"

# Thoughts Directory
# Disabled for rapid iteration; data teams can enable for larger projects.
thoughts_directory: false
thoughts_path: "thoughts/shared"

# Ticket System Integration
# Configure for Asana task management
ticket_system: "asana"
ticket_mcp_prefix: "mcp__asana"
ticket_id_pattern: "pipeline-\\d+"
ticket_default_project: "data-engineering"
ticket_statuses:
  todo: "Not Started"
  in_progress: "In Progress"
  in_review: "In Review"
  done: "Completed"

# Git & PR Conventions
# Use pipeline/ prefix for data work
branch_prefix: "pipeline/"
commit_style: "freeform"
pr_template_path: "thoughts/shared/pr_description.md"
default_base_branch: "main"

# Model Selection
models:
  planning: "opus"
  analysis: "sonnet"
  quick: "haiku"

# CI/CD
ci_mode: false
ci_commit_prefix: "ci: "

# Worktree Configuration
worktree_base_path: "../worktrees"
worktree_auto_cleanup: true
