# specs.config.yaml — Frontend App Example
#
# React/Next.js frontend application with freeform commits and Jira for issue tracking.
# Copy this file to your project root and customize as needed.

project_name: "my-frontend"
project_description: "React/Next.js web application with TypeScript"

# Thoughts Directory
# Store design decisions, accessibility notes, and component research.
thoughts_directory: true
thoughts_path: "thoughts/shared"

# Ticket System Integration
# Configure for Jira issue tracking
ticket_system: "jira"
ticket_mcp_prefix: "mcp__jira"
ticket_id_pattern: "FE-\\d+"
ticket_default_project: "frontend"
ticket_statuses:
  todo: "To Do"
  in_progress: "In Progress"
  in_review: "In Review"
  done: "Done"

# Git & PR Conventions
# Use feature/ prefix for UI development
branch_prefix: "feature/"
commit_style: "freeform"
pr_template_path: "thoughts/shared/pr_description.md"
default_base_branch: "main"

# Model Selection
models:
  planning: "opus"
  analysis: "sonnet"
  quick: "haiku"

# CI/CD
ci_mode: false
ci_commit_prefix: "ci: "

# Worktree Configuration
worktree_base_path: "../worktrees"
worktree_auto_cleanup: true
