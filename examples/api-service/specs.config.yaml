# specs.config.yaml — API Service Example
#
# REST API backend project with conventional commits and Linear for issue tracking.
# Copy this file to your project root and customize as needed.

project_name: "my-api"
project_description: "RESTful API service with PostgreSQL and Redis"

# Thoughts Directory
# Store plans, handoffs, and PR descriptions for cross-session continuity.
thoughts_directory: true
thoughts_path: "thoughts/shared"

# Ticket System Integration
# Configure for Linear issue tracking
ticket_system: "linear"
ticket_mcp_prefix: "mcp__linear"
ticket_id_pattern: "API-\\d+"
ticket_default_project: "backend"
ticket_statuses:
  todo: "Todo"
  in_progress: "In Progress"
  in_review: "In Review"
  done: "Done"

# Git & PR Conventions
branch_prefix: "feat/"
commit_style: "conventional"
pr_template_path: "thoughts/shared/pr_description.md"
default_base_branch: "main"

# Model Selection
models:
  planning: "opus"
  analysis: "sonnet"
  quick: "haiku"

# CI/CD
ci_mode: false
ci_commit_prefix: "ci: "

# Worktree Configuration
worktree_base_path: "../worktrees"
worktree_auto_cleanup: true
